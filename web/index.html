<!DOCTYPE html>
<html>
<head>
  <!--

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">
  <meta name="google-signin-client_id" content="553315913700-phfi41sm9d7n45d2k70jhihal2qjbn0n.apps.googleusercontent.com" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="roamora">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>roamora</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAC3dXZ-loyhd4Cjk0zZ2gZGwo9ValLE9g&libraries=places"></script>
  <script>
    window.getGoogleSuggestions = function(input, callback) {
      var service = new google.maps.places.AutocompleteService();
      service.getPlacePredictions({ input: input }, function(predictions, status) {
        if (status !== google.maps.places.PlacesServiceStatus.OK) {
          callback(null);
          return;
        }
        var results = predictions.map(function(p) {
          return {
            placeId: p.place_id,
            description: p.description
          };
        });
        callback(results);
      });
    };

    window.getGooglePlaceDetails = function(placeId, callback) {
      var map = new google.maps.Map(document.createElement('div'));
      var service = new google.maps.places.PlacesService(map);
      service.getDetails({ placeId: placeId, fields: ['geometry', 'formatted_address'] }, function(place, status) {
        if (status !== google.maps.places.PlacesServiceStatus.OK) {
          callback(null);
          return;
        }
        callback({
          lat: place.geometry.location.lat(),
          lng: place.geometry.location.lng(),
          address: place.formatted_address
        });
      });
    };
  </script>
</head>
<body>
  <!--

</body>
</html>
